<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <main class="container">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-wrapper">
      <div class="left-col">
        <div class="top-bar">
          <label class="top-label">Difficulty:
            <select id="difficultySelect" class="top-select">
              <option value="normal">Normal</option>
              <option value="hard">Hard</option>
            </select>
          </label>
          <div class="top-hs">
            <span class="top-label">High:</span>
            <strong id="highScoreDisplay">0</strong>
          </div>
        </div>
        <div class="board-container">
          <canvas id="gameCanvas"></canvas>
          <div id="overlay" class="overlay">
            <div class="overlay-content">
              <p id="overlayMessage" class="overlay-message">Press Enter to Start</p>
              <p id="overlaySub" class="overlay-sub">Use arrow keys to play</p>
            </div>
          </div>
        </div>
        <div class="ctrl-row" id="ctrlRow">
          <button class="ctrl-btn" data-action="left">◀</button>
          <button class="ctrl-btn" data-action="down">▼</button>
          <button class="ctrl-btn" data-action="right">▶</button>
          <button class="ctrl-btn" data-action="rotate">↻</button>
          <button class="ctrl-btn" data-action="harddrop">⤓</button>
        </div>
      </div>
      <div class="right-col">
        <div class="panel-actions">
          <button id="muteBtn" class="panel-action-btn">🔊</button>
          <button id="pauseBtn" class="panel-action-btn">⏸</button>
        </div>
        <div class="panel-stats">
          <div class="panel-section">
            <h3>Next</h3>
            <canvas id="nextCanvas"></canvas>
          </div>
          <div class="panel-section">
            <h3>Score</h3>
            <p id="scoreDisplay" class="stat-value">0</p>
          </div>
          <div class="panel-section">
            <h3>Lines</h3>
            <p id="linesDisplay" class="stat-value">0</p>
          </div>
          <div class="panel-section">
            <h3>Level</h3>
            <p id="levelDisplay" class="stat-value">1</p>
          </div>
        </div>
        <div class="panel-controls">
          <table>
            <tr><td>← →</td><td>Move</td></tr>
            <tr><td>↑</td><td>Rotate</td></tr>
            <tr><td>↓</td><td>Soft drop</td></tr>
            <tr><td>Space</td><td>Hard drop</td></tr>
            <tr><td>P</td><td>Pause</td></tr>
            <tr><td>M</td><td>Mute</td></tr>
            <tr><td>Enter</td><td>Start</td></tr>
          </table>
        </div>
      </div>
    </div>
  </main>
  <script src="src/tetris.js"></script>
</body>
</html>
